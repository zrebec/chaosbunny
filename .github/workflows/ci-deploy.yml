name: CI & Deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write # semantic-release pushes the version-bump commit + tag
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false # never cancel a run that may be mid-release-push

jobs:
  release:
    # Auto-release (semantic-release, since v0.3.0): feat → minor, fix/perf →
    # patch; chore / refactor / docs / style / test / ci → nothing. It bumps
    # package.json, prepends CHANGELOG.md, tags vX.Y.Z, creates a GitHub release
    # and pushes "chore(release): X.Y.Z [skip ci]" — remember to `git pull`.
    # The job-level gate just saves runner minutes on non-releasable pushes;
    # semantic-release re-checks the commits itself either way.
    if: >
      github.event_name == 'push' &&
      (startsWith(github.event.head_commit.message, 'feat') ||
       startsWith(github.event.head_commit.message, 'fix') ||
       startsWith(github.event.head_commit.message, 'perf') ||
       contains(github.event.head_commit.message, 'BREAKING CHANGE'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs tags + full history

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  build:
    # Builds the *post-release* master tip so the in-game version readout (and
    # the served CHANGELOG) match the release that just happened. A manual run
    # (workflow_dispatch) always builds — an override.
    needs: release
    if: >
      !cancelled() &&
      (needs.release.result == 'success' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master # includes the release commit pushed by the job above

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
